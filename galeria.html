<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuestros Momentos Juntos 📸</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #ffe3e3;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 5px 15px 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        h1 {
            color: #ff4d6d;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            margin: 5px 0 2px 0;
            font-size: 24px;
            text-align: center;
        }

        .instruccion {
            font-size: 13px;
            color: #ff758f;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Contenedor de la pila de cartas con excelente proporción */
        .pila-contenedor {
            position: relative;
            width: 100%;
            max-width: 335px;
            height: 600px;
            margin-bottom: 15px;
        }

        /* Tarjetas apiladas */
        .foto-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: white;
            padding: 12px;
            padding-bottom: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.5s ease, opacity 0.5s ease;
            transform-origin: bottom center;
            display: flex;
            flex-direction: column;
        }

        /* Cubre todo el espacio de forma limpia enfocando los rostros */
        .foto-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            pointer-events: none;
            border-radius: 4px;
        }

        .pie-foto {
            text-align: center;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 13px;
            color: #555;
            line-height: 1.2;
            flex-shrink: 0;
        }

        /* --- CONFIGURACIÓN DE LOS COLLAGES --- */
        .collage-base {
            display: grid;
            gap: 6px;
            width: 100%;
            flex-grow: 1;
            overflow: hidden;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        /* DISEÑO C: 3 Fotos (Izquierda grande completa, Derecha dos distribuidas) */
        .collage-diseno-c {
            grid-template-columns: 1.1fr 0.9fr;
            grid-template-rows: 1fr 1fr;
        }

        .collage-diseno-c .img-grande {
            grid-row: span 2;
        }

        /* DISEÑO B: 4 Fotos Simétricas (Cuadrícula 2x2) */
        .collage-diseno-b {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        /* Animación de descarte */
        .foto-card.descartada {
            transform: translateX(160%) rotate(35deg) !important;
            opacity: 0;
            pointer-events: none;
        }

        .boton-volver {
            margin-top: 5px;
            margin-bottom: 90px;
            padding: 11px 25px;
            background-color: #ff4d6d;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.25);
            z-index: 10;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Reproductor de Música */
        .reproductor-flotante {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            /* Efecto esmerilado premium en iOS/Android */
            -webkit-backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 40px;
            box-shadow: 0 8px 24px rgba(255, 77, 109, 0.15);
            border: 1px solid rgba(255, 179, 193, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            width: 88%;
            max-width: 310px;
            transition: all 0.3s ease;
        }

        .reproductor-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nota-musical {
            font-size: 18px;
            animation: rotarNota 3s linear infinite paused;
            /* Solo rotará cuando suene */
        }

        .texto-musica {
            display: flex;
            flex-direction: column;
        }

        .titulo-cancion {
            font-size: 13px;
            color: #ff4d6d;
            font-weight: bold;
            letter-spacing: 0.3px;
        }

        .estado-cancion {
            font-size: 10px;
            color: #888;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 1px;
        }

        /* Botón de Play/Pausa Circular */
        .btn-reproductor {
            background-color: #ff4d6d;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
            transition: transform 0.2s, background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }

        .btn-reproductor:active {
            transform: scale(0.92);
        }

        .btn-reproductor svg {
            width: 18px;
            height: 18px;
            fill: white;
            transition: all 0.2s ease;
        }

        /* Animación juguetona para la nota musical */
        @keyframes rotarNota {
            0% {
                transform: rotate(0deg) scale(1);
            }

            50% {
                transform: rotate(15deg) scale(1.1);
            }

            100% {
                transform: rotate(0deg) scale(1);
            }
        }

        audio {
            width: 100%;
            height: 28px;
        }
    </style>
</head>

<body>

    <h1 style="margin-top: 10%;">✨ Nuestros Momentos ✨</h1>
    <div class="instruccion">Toca la tarjeta para ver el siguiente collage 😉</div>

    <div class="pila-contenedor" id="pila">

        <div class="foto-card" style="transform: scale(0.85) translateY(15px); z-index: 1;">
            <div class="collage-base collage-diseno-b">
                <img class="img-1" src="11.jpeg" alt="Foto 1">
                <img class="img-2" src="12.jpeg" alt="Foto 2">
                <img class="img-3" src="13.jpeg" alt="Foto 3">
                <img class="img-4" src="14.jpeg" alt="Foto 4">
            </div>
            <div class="pie-foto">¡Por más momentos increíbles juntos! 🥂✨</div>
        </div>

        <div class="foto-card" style="transform: scale(0.90) translateY(10px); z-index: 2;">
            <div class="collage-base collage-diseno-c">
                <img class="img-grande" src="8.jpeg" alt="Foto 8">
                <img src="9.jpeg" alt="Foto 9">
                <img src="10.jpeg" alt="Foto 10">
            </div>
            <div class="pie-foto">Cada aventura contigo es mi parte favorita del viaje 🌍✈️</div>
        </div>

        <div class="foto-card" style="transform: scale(0.95) translateY(5px); z-index: 3;">
            <div class="collage-base collage-diseno-b">
                <img src="4.jpeg" alt="Foto 4">
                <img src="5.jpeg" alt="Foto 5">
                <img src="6.jpeg" alt="Foto 6">
                <img src="7.jpeg" alt="Foto 7">
            </div>
        </div>

        <div class="foto-card" style="transform: scale(1) translateY(0px); z-index: 4;"
            onclick="descartarTarjeta(this)">
            <div class="collage-base collage-diseno-c">
                <img class="img-grande" src="2.jpeg" alt="Foto 1">
                <img src="1.jpeg" alt="Foto 2">
                <img src="3.jpeg" alt="Foto 3">
            </div>
        </div>

    </div>

    <a href="index.html" class="boton-volver">⬅ Leer carta de nuevo</a>

    <div class="reproductor-flotante">
        <div class="reproductor-info">
            <span class="nota-musical">🎵</span>
            <div class="texto-musica">
                <span class="titulo-cancion">Nuestra Canción</span>
                <span class="estado-cancion" id="estadoMusica">Paquetes de amor... 🤍</span>
            </div>
        </div>
        <button class="btn-reproductor" id="btnPlayPausa" onclick="toggleMusica()">
            <svg id="iconoControl" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </svg>
        </button>
        <audio id="musicaFondo" src="musica.mp3" loop></audio>
    </div>

    <script>
        function descartarTarjeta(tarjeta) {
            tarjeta.classList.add('descartada');
            tarjeta.removeAttribute('onclick');

            const restantes = document.querySelectorAll('.foto-card:not(.descartada)');
            if (restantes.length > 0) {
                const siguiente = restantes[restantes.length - 1];
                siguiente.style.transform = 'scale(1) translateY(0px)';
                siguiente.setAttribute('onclick', 'descartarTarjeta(this)');
            } else {
                // REINICIO MATEMÁTICO DINÁMICO AUTO-ADAPTABLE
                setTimeout(() => {
                    const todas = document.querySelectorAll('.foto-card');
                    const total = todas.length;

                    todas.forEach((t, index) => {
                        t.classList.remove('descartada');

                        // Calcula las proporciones perfectas sin importar si hay 3, 4 o 10 tarjetas
                        const distanciaAlFrente = (total - 1) - index;
                        const scale = 1 - (distanciaAlFrente * 0.05);
                        const translateY = distanciaAlFrente * 5;

                        t.style.transform = `scale(${scale}) translateY(${translateY}px)`;

                        if (index === total - 1) {
                            t.setAttribute('onclick', 'descartarTarjeta(this)');
                        } else {
                            t.removeAttribute('onclick');
                        }
                    });
                }, 600);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const miMusica = document.getElementById('musicaFondo');
            if (urlParams.get('play') === 'true') {
                miMusica.play().catch(error => console.log("Auto-play restringido.", error));
            }
        });

        const miMusica = document.getElementById('musicaFondo');
        const iconoControl = document.getElementById('iconoControl');
        const estadoMusica = document.getElementById('estadoMusica');
        const notaMusical = document.querySelector('.nota-musical');

        // Path SVG de los iconos
        const SVG_PLAY = '<path d="M8 5v14l11-7z"/>';
        const SVG_PAUSA = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

        function toggleMusica() {
            if (miMusica.paused) {
                reproducirAudio();
            } else {
                pausarAudio();
            }
        }

        function reproducirAudio() {
            miMusica.play().then(() => {
                iconoControl.innerHTML = SVG_PAUSA;
                estadoMusica.innerText = 'Sonando ahora... ✨';
                notaMusical.style.animationPlayState = 'running';
            }).catch(error => console.log("Reproducción bloqueada por navegador:", error));
        }

        function pausarAudio() {
            miMusica.pause();
            iconoControl.innerHTML = SVG_PLAY;
            estadoMusica.innerText = 'En pausa 🌸';
            notaMusical.style.animationPlayState = 'paused';
        }

        // Manejo del auto-play que viene desde la carta de bienvenida
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('play') === 'true') {
                // Pequeño timeout para asegurar la interacción correcta en móviles
                setTimeout(reproducirAudio, 300);
            }
        });
    </script>

</body>

</html>
